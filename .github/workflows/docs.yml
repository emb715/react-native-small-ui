name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build library
        run: yarn prepare

      - name: Build example app (web export)
        run: yarn build:example

      - name: Verify example export exists
        run: |
          if [ ! -f docs/public/example/index.html ]; then
            echo "::error::Example web export is missing — docs/public/example/index.html not found. Run 'yarn build:example' locally and commit the output, or fix the Expo web export."
            exit 1
          fi
          echo "✅ Example export verified."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install docs dependencies
        run: yarn install --immutable
        working-directory: docs

      - name: Build docs site
        run: yarn build
        working-directory: docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4